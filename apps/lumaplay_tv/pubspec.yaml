name: lumaplay_tv
description: LumaPlay TV
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^16.0.0
  flutter_secure_storage: ^9.2.2
  video_player: ^2.11.1
  dio: ^5.9.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/branding/app_icon.png"
  adaptive_icon_background: "#050816"
  adaptive_icon_foreground: "assets/images/branding/app_icon.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#050816"
  image: assets/images/branding/lumaplay_mark.png
  android: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/branding/
